<h1>User Management</h1>

<template @if="user.role === 'admin'">
  <div data-bn="card">
    <div data-bn="card-body" style="overflow-x:auto">
      <table data-bn="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>
          <template @for="row of users">
            <tr>
              <td>{{ row.id }}</td>
              <td>{{ row.username }}</td>
              <td>{{ row.email }}</td>
              <td><span data-bn="badge" data-variant="default">{{ row.role }}</span></td>
              <td>{{ row.created_at }}</td>
            </tr>
          </template>
        </tbody>
      </table>
      <template @if="users.length === 0">
        <p style="text-align:center;padding:var(--bn-space-6);color:var(--bn-color-text-muted);font-size:var(--bn-font-size-sm)">No users found.</p>
      </template>
    </div>
  </div>
</template>

<template @if="user.role !== 'admin'">
  <div data-bn="alert" data-variant="error">You do not have permission to view this page.</div>
</template>
