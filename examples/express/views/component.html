<article data-bn-component-page>
  {{ breadcrumb }}

  <header data-bn-component-header>
    <p data-bn-eyebrow>{{ component.categoryTitle }}</p>
    <h2>{{ component.title }}</h2>
    <p data-bn-lede>{{ component.summary }}</p>
    <p data-bn-component-tag-line>
      Built on <code>&lt;{{ component.tag }}&gt;</code>
    </p>
  </header>

  <template @for="example of examples; track example.title">
    <section data-bn-component-example>
      <header>
        <h3>{{ example.title }}</h3>
        <p>{{ example.description }}</p>
      </header>

      <figure data-bn-component-demo>
        <figcaption>Live render</figcaption>
        <output>{{ example.html }}</output>
      </figure>

      <details data-bn-component-source>
        <summary>
          <span aria-hidden="true">⌄</span>
          <span>View source</span>
        </summary>
        <pre><code>{{ example.code }}</code></pre>
        <button
          type="button"
          data-bn-action="copy-code"
          data-bn-cta="secondary"
          aria-label="Copy code to clipboard"
        >
          Copy code
        </button>
      </details>
    </section>
  </template>

  <template @if="related.length">
    <aside data-bn-component-related aria-label="Related components">
      <h3>More in <em>{{ component.categoryTitle }}</em></h3>
      <ul role="list" data-bn-component-grid>
        <template @for="r of related; track r.slug">
          <li>
            <a href="/components/{{ r.slug }}" data-bn-component-card>
              <header>
                <h3>{{ r.title }}</h3>
                <code data-bn-component-tag>&lt;{{ r.tag }}&gt;</code>
              </header>
              <p>{{ r.summary }}</p>
            </a>
          </li>
        </template>
      </ul>
    </aside>
  </template>

  <nav data-bn-component-pager aria-label="Component pagination">
    <template @if="prev">
      <a href="/components/{{ prev.slug }}" rel="prev">
        <span aria-hidden="true">←</span> {{ prev.title }}
      </a>
    </template>
    <template @if="!prev">
      <span></span>
    </template>
    <a href="/components" data-bn-component-pager-index>All components</a>
    <template @if="next">
      <a href="/components/{{ next.slug }}" rel="next">
        {{ next.title }} <span aria-hidden="true">→</span>
      </a>
    </template>
    <template @if="!next">
      <span></span>
    </template>
  </nav>
</article>

<script type="module">
  for (const btn of document.querySelectorAll('[data-bn-action="copy-code"]')) {
    btn.addEventListener('click', async () => {
      const pre = btn.parentElement?.querySelector('pre code');
      if (!pre) return;
      try {
        await navigator.clipboard.writeText(pre.textContent || '');
        const prev = btn.textContent;
        btn.textContent = 'Copied ✓';
        btn.setAttribute('data-bn-copied', '');
        setTimeout(() => { btn.textContent = prev; btn.removeAttribute('data-bn-copied'); }, 1400);
      } catch {
        btn.textContent = 'Copy failed';
      }
    });
  }
</script>
