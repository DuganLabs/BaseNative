name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec nx run-many --target=lint

      - name: Test with coverage
        run: pnpm exec nx run-many --target=test:coverage

      - name: Test (fallback without coverage)
        if: failure()
        run: pnpm exec nx run-many --target=test

      - name: Bundle size check
        run: node scripts/bundle-size.js

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm exec nx bundle basenative-example-express

      - name: Run E2E tests
        run: pnpm exec playwright test tests/e2e/
