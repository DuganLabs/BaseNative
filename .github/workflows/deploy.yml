name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      deploy-url: ${{ steps.prod-url.outputs.url }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:pages

      - id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name basenative

      - id: prod-url
        run: echo "url=https://basenative-docs.pages.dev" >> "$GITHUB_OUTPUT"

  audit:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx playwright install chromium --with-deps

      - run: pnpm build:pages

      - name: Accessibility audit (axe-core)
        run: pnpm audit:axe

      - name: UX audit (Laws of UX)
        run: pnpm audit:ux

      - name: Security audit (Mozilla Observatory)
        run: pnpm audit:observatory
        env:
          DEPLOY_URL: ${{ needs.deploy.outputs.deploy-url }}

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: audit-reports
          path: reports/
